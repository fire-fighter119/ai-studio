<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRE×AI STUDIO — 司令室</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#070B13;--surface:#0F1A2E;--surface2:#182847;--surface3:#1F3460;
      --gold:#F4C76A;--gold2:#E8A935;--green:#28B779;--blue:#3B82F6;
      --red:#FF6B5E;--orange:#FFD166;--text:#F0F4FF;--text2:#A8BEDD;
      --border:rgba(244,199,106,.2);
    }
    html{scroll-behavior:smooth;}
    body{
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
      line-height:1.7;overflow-x:hidden;min-height:100vh;
    }

    /* ── NAV ── */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
      background:rgba(7,11,19,.92);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .nav-left{display:flex;align-items:center;gap:12px;}
    .nav-logo{font-size:15px;font-weight:900;color:var(--gold);letter-spacing:1px;}
    .nav-sub{font-size:11px;color:var(--text2);font-weight:600;}
    .nav-link{
      font-size:12px;color:var(--text2);text-decoration:none;font-weight:600;
      transition:color .2s;
    }
    .nav-link:hover{color:var(--gold);}
    .live-badge{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;color:var(--green);letter-spacing:1px;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

    /* ── MAIN ── */
    main{padding:90px 24px 60px;max-width:920px;margin:0 auto;}

    /* ── SECTION LABEL ── */
    .sec-label{
      font-size:10px;font-weight:800;color:var(--text2);letter-spacing:2.5px;
      margin-bottom:14px;margin-top:36px;
    }

    /* ── MISSION ── */
    .mission-card{
      border:1px solid var(--border);border-radius:18px;padding:26px 30px;
      background:linear-gradient(135deg,#0F1A2E,rgba(31,52,96,.7));
      position:relative;overflow:hidden;
    }
    .mission-card::before{
      content:'';position:absolute;top:-60px;right:-60px;
      width:200px;height:200px;border-radius:50%;
      background:radial-gradient(circle,rgba(244,199,106,.1),transparent 70%);
      pointer-events:none;
    }
    .mission-label{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:2px;margin-bottom:8px;}
    .mission-text{font-size:22px;font-weight:900;color:var(--text);}
    .mission-sub{font-size:13px;color:var(--text2);margin-top:6px;}

    /* ── AGENTS ── */
    .agents{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .agent-card{
      background:var(--surface);border-radius:18px;padding:22px 20px;
      position:relative;overflow:hidden;border:1px solid transparent;
      transition:transform .2s;
    }
    .agent-card:hover{transform:translateY(-3px);}
    .agent-card.owner {border-color:rgba(244,199,106,.35);}
    .agent-card.active {border-color:rgba(40,183,121,.4);}
    .agent-card.standby{border-color:rgba(168,190,221,.15);}
    .agent-card::after{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;
    }
    .agent-card.owner::after {background:var(--gold);}
    .agent-card.active::after {background:var(--green);}
    .agent-card.standby::after{background:var(--text2);}
    .agent-icon{font-size:32px;display:block;margin-bottom:12px;}
    .agent-name{font-size:18px;font-weight:900;color:var(--text);}
    .agent-role{font-size:10px;font-weight:800;letter-spacing:1px;margin-bottom:12px;}
    .agent-card.owner  .agent-role{color:var(--gold);}
    .agent-card.active .agent-role{color:var(--green);}
    .agent-card.standby .agent-role{color:var(--text2);}
    .agent-status{
      display:inline-flex;align-items:center;gap:5px;
      font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;margin-bottom:12px;
    }
    .st-owner  {background:rgba(244,199,106,.12);color:var(--gold);}
    .st-active {background:rgba(40,183,121,.15);color:var(--green);}
    .st-standby{background:rgba(168,190,221,.1);color:var(--text2);}
    .agent-task{font-size:12px;color:var(--text2);line-height:1.5;min-height:36px;}
    .agent-duties{
      margin-top:14px;padding-top:14px;
      border-top:1px solid rgba(255,255,255,.07);
    }
    .duty{font-size:11px;color:var(--text2);padding:3px 0;display:flex;align-items:baseline;gap:6px;}
    .duty::before{content:'·';color:var(--gold);font-size:16px;line-height:1;}

    /* ── WORKFLOW ── */
    .flow-wrap{display:flex;align-items:stretch;gap:0;}
    .flow-step{
      flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:18px 12px;text-align:center;
    }
    .flow-arrow{
      display:flex;align-items:center;justify-content:center;
      color:var(--gold);font-size:20px;padding:0 6px;flex-shrink:0;opacity:.7;
    }
    .flow-num{font-size:9px;font-weight:800;color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
    .flow-who{font-size:13px;font-weight:800;color:var(--text);}
    .flow-what{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4;}

    /* ── PROJECTS ── */
    .project-item{
      background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:16px 20px;margin-bottom:10px;
      display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    }
    .project-name{font-size:14px;font-weight:800;color:var(--text);min-width:200px;}
    .project-bar-wrap{flex:1;background:rgba(255,255,255,.06);border-radius:99px;height:7px;min-width:100px;}
    .project-bar{height:7px;border-radius:99px;transition:width .5s;}
    .project-bar.live{background:var(--green);}
    .project-bar.wip {background:var(--gold);}
    .project-pct{font-size:12px;font-weight:800;color:var(--text2);min-width:32px;text-align:right;}
    .project-badge{
      font-size:10px;font-weight:800;padding:4px 12px;border-radius:99px;min-width:60px;text-align:center;
    }
    .badge-live{background:rgba(40,183,121,.15);color:var(--green);}
    .badge-wip {background:rgba(244,199,106,.12);color:var(--gold);}

    /* ── LOG ── */
    .log-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;}
    .log-item{font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:10px;}
    .log-item:last-child{border-bottom:none;padding-bottom:0;}

    /* ── RESPONSIVE ── */
    @media(max-width:680px){
      nav{padding:12px 16px;}
      main{padding:80px 16px 40px;}
      .agents{grid-template-columns:1fr;}
      .flow-wrap{flex-direction:column;gap:8px;}
      .flow-arrow{transform:rotate(90deg);padding:0;}
      .project-name{min-width:100%;flex:none;}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <span class="nav-logo">FIRE×AI STUDIO</span>
    <span class="nav-sub">司令室</span>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <a class="nav-link" href="index.html">会社概要</a>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
</nav>

<main>

  <!-- MISSION -->
  <div class="sec-label">CURRENT MISSION</div>
  <div class="mission-card" id="missionCard">
    <div class="mission-label">NOW OPERATING</div>
    <div class="mission-text" id="missionText">—</div>
    <div class="mission-sub" id="missionSub">—</div>
  </div>

  <!-- AGENTS -->
  <div class="sec-label">AGENTS</div>
  <div class="agents" id="agentsGrid"></div>

  <!-- WORKFLOW -->
  <div class="sec-label">WORKFLOW</div>
  <div class="flow-wrap" id="flowWrap"></div>

  <!-- PROJECTS -->
  <div class="sec-label">PROJECTS</div>
  <div id="projectsList"></div>

  <!-- LOG -->
  <div class="sec-label">最近の完了ログ</div>
  <div class="log-card" id="activityLog"></div>

</main>

<script>
/* ═══════════════════════════════════════════════
   ここを書き換えるだけで全体が更新される
   ═══════════════════════════════════════════════ */
const CONFIG = {

  mission: {
    text: '司令室ダッシュボード 構築完了',
    sub: 'ゲン主導 — エージェント構成・ワークフロー可視化'
  },

  agents: [
    {
      icon: '🔥',
      name: 'fire_invest',
      role: 'OWNER',
      state: 'owner',
      statusLabel: 'オーナー',
      task: 'ダッシュボードを確認中',
      duties: [
        'やりたいことを言う',
        '完成物を評価する',
        'ヒヨへ指示文を転送する'
      ]
    },
    {
      icon: '🧠',
      name: 'ゲン',
      role: 'COMMANDER — Claude Code',
      state: 'active',
      statusLabel: '実行中',
      task: 'ダッシュボード構築・設計判断',
      duties: [
        '判断・設計・指示生成',
        'サブタスク調査・実行',
        'ヒヨの実装レビュー',
        '日本語テキスト・記事作成'
      ]
    },
    {
      icon: '⚡',
      name: 'ヒヨ',
      role: 'ENGINEER — Codex',
      state: 'standby',
      statusLabel: '待機中',
      task: '次の指示を待機',
      duties: [
        'コード実装・ファイル操作',
        'CSS・UIコンポーネント',
        'データ追加・編集',
        'バグ修正'
      ]
    }
  ],

  workflow: [
    { step:'STEP 1', who:'🔥 fire_invest', what:'やりたいことを言う' },
    { step:'STEP 2', who:'🧠 ゲン',        what:'判断・設計・指示生成' },
    { step:'STEP 3', who:'🔥 fire_invest', what:'指示文をヒヨへ転送' },
    { step:'STEP 4', who:'⚡ ヒヨ',        what:'コード実装' },
    { step:'STEP 5', who:'🔥 fire_invest', what:'評価・次のオーダー' }
  ],

  projects: [
    { name: '🛡️ keibi-app',           pct: 82,  status: 'LIVE'  },
    { name: '🏢 ai-studio',           pct: 100, status: 'LIVE'  },
    { name: '📰 local-news-platform', pct: 40,  status: '開発中' }
  ],

  log: [
    '✅ 司令室ダッシュボード 設計・構築',
    '✅ エージェント構成 3体に確定（fire / ゲン / ヒヨ）',
    '✅ FIRE×AI STUDIO 会社紹介ページ 公開',
    '✅ CODEX_CONTEXT.md・AI_ROLES.md 作成',
    '✅ keibi-app テキスト・デザイン全面改善'
  ]

};
/* ═══════════════════════════════════════════════ */


// --- Render mission ---
document.getElementById('missionText').textContent = CONFIG.mission.text;
document.getElementById('missionSub').textContent  = CONFIG.mission.sub;

// --- Render agents ---
const grid = document.getElementById('agentsGrid');
CONFIG.agents.forEach(a => {
  const stMap = { owner:'st-owner', active:'st-active', standby:'st-standby' };
  grid.innerHTML += `
    <div class="agent-card ${a.state}">
      <span class="agent-icon">${a.icon}</span>
      <div class="agent-name">${a.name}</div>
      <div class="agent-role">${a.role}</div>
      <div class="agent-status ${stMap[a.state]}">● ${a.statusLabel}</div>
      <div class="agent-task">${a.task}</div>
      <div class="agent-duties">${a.duties.map(d=>`<div class="duty">${d}</div>`).join('')}</div>
    </div>`;
});

// --- Render workflow ---
const flow = document.getElementById('flowWrap');
CONFIG.workflow.forEach((s, i) => {
  flow.innerHTML += `
    <div class="flow-step">
      <div class="flow-num">${s.step}</div>
      <div class="flow-who">${s.who}</div>
      <div class="flow-what">${s.what}</div>
    </div>`;
  if (i < CONFIG.workflow.length - 1) {
    flow.innerHTML += `<div class="flow-arrow">→</div>`;
  }
});

// --- Render projects ---
const projects = document.getElementById('projectsList');
CONFIG.projects.forEach(p => {
  const isLive = p.status === 'LIVE';
  projects.innerHTML += `
    <div class="project-item">
      <div class="project-name">${p.name}</div>
      <div class="project-bar-wrap">
        <div class="project-bar ${isLive?'live':'wip'}" style="width:${p.pct}%"></div>
      </div>
      <div class="project-pct">${p.pct}%</div>
      <div class="project-badge ${isLive?'badge-live':'badge-wip'}">${p.status}</div>
    </div>`;
});

// --- Render log ---
const log = document.getElementById('activityLog');
CONFIG.log.forEach(l => {
  log.innerHTML += `<div class="log-item">${l}</div>`;
});
</script>
</body>
</html>
